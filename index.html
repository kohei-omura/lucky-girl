<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>✨ Lucky Girl Oracle v13</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:    #0d0b1a;
    --deep:   #12102a;
    --card:   #1a1730;
    --glass:  rgba(255,255,255,.06);
    --border: rgba(255,255,255,.1);
    --gold:   #e8c96a;
    --rose:   #f49aad;
    --violet: #a78bfa;
    --ice:    #93c5fd;
    --text:   #f0eaff;
    --muted:  #8b80ac;
    --green:  #6ee7b7;
    --sakura: #ffd6e0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Star background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(167,139,250,.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(244,154,173,.10) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(232,201,106,.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,.6), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 90% 25%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 55% 85%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 80% 90%, rgba(255,255,255,.5), transparent),
      radial-gradient(2px 2px at 40% 30%, rgba(232,201,106,.4), transparent),
      radial-gradient(2px 2px at 65% 50%, rgba(167,139,250,.4), transparent),
      radial-gradient(1.5px 1.5px at 25% 55%, rgba(244,154,173,.5), transparent);
  }

  .wrap { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; padding: 0 16px 80px; }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 40px 0 28px;
    position: relative;
  }
  .header-subtitle {
    font-family: 'Cinzel Decorative', serif;
    font-size: .62rem;
    letter-spacing: .3em;
    color: var(--gold);
    margin-bottom: 10px;
    opacity: .85;
  }
  .header-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.7rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold) 0%, var(--rose) 50%, var(--violet) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .header-date {
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: .1em;
  }

  /* ── Today Fortune Bar ── */
  .fortune-bar {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    align-items: center;
    backdrop-filter: blur(8px);
  }
  .fb-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .fb-label { font-size: .58rem; color: var(--muted); letter-spacing: .08em; }
  .fb-value { font-size: .8rem; font-weight: 700; color: var(--text); }
  .fb-value.gold { color: var(--gold); }
  .fb-value.rose { color: var(--rose); }
  .fb-value.violet { color: var(--violet); }
  .fb-value.green { color: var(--green); }

  /* ── Main image card ── */
  .image-card {
    background: linear-gradient(145deg, rgba(26,23,48,.9), rgba(18,16,42,.95));
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 20px;
    position: relative;
  }

  .image-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .image-header-left { display: flex; align-items: center; gap: 8px; }
  .image-header-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: .6rem;
    letter-spacing: .2em;
    color: var(--gold);
  }
  .image-theme-badge {
    font-size: .68rem;
    background: rgba(232,201,106,.12);
    border: 1px solid rgba(232,201,106,.25);
    color: var(--gold);
    padding: 2px 10px;
    border-radius: 20px;
  }

  .image-wrap {
    position: relative;
    width: 100%;
    min-height: 400px;
    background: linear-gradient(180deg, rgba(30,20,50,.8) 0%, rgba(10,8,25,.9) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .main-image {
    width: 100%;
    max-height: 520px;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity .8s ease;
  }
  .main-image.loaded { opacity: 1; }

  .loading-overlay {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(13,11,26,.85);
    transition: opacity .5s ease;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .loading-icon {
    width: 56px; height: 56px;
    border: 2px solid rgba(232,201,106,.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Shippori Mincho', serif;
    font-size: .8rem;
    color: var(--gold);
    letter-spacing: .15em;
    animation: pulse 2s ease-in-out infinite;
  }
  .loading-sub { font-size: .68rem; color: var(--muted); letter-spacing: .06em; }
  @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }

  /* Error state */
  .error-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 60px 20px;
    text-align: center;
  }
  .error-icon { font-size: 2.4rem; }
  .error-msg { font-size: .82rem; color: var(--muted); line-height: 1.7; }

  /* ── Prompt reveal ── */
  .prompt-section {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
  }
  .prompt-label {
    font-size: .6rem;
    letter-spacing: .12em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .prompt-text {
    font-size: .7rem;
    color: rgba(255,255,255,.45);
    line-height: 1.6;
    font-style: italic;
  }

  /* ── Action buttons ── */
  .action-row {
    display: flex;
    gap: 10px;
    padding: 0 20px 20px;
  }
  .btn {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 12px 8px;
    font-size: .78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s ease;
    letter-spacing: .06em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:active { transform: scale(.97); }
  .btn-regen {
    background: linear-gradient(135deg, rgba(167,139,250,.2), rgba(244,154,173,.2));
    border: 1px solid rgba(167,139,250,.35);
    color: var(--violet);
  }
  .btn-regen:hover { background: linear-gradient(135deg, rgba(167,139,250,.3), rgba(244,154,173,.3)); }
  .btn-dl {
    background: linear-gradient(135deg, rgba(232,201,106,.2), rgba(110,231,183,.15));
    border: 1px solid rgba(232,201,106,.35);
    color: var(--gold);
  }
  .btn-dl:hover { background: linear-gradient(135deg, rgba(232,201,106,.3), rgba(110,231,183,.25)); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ── Divination result ── */
  .div-card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .div-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: .6rem;
    letter-spacing: .2em;
    color: var(--gold);
    margin-bottom: 14px;
    text-align: center;
  }
  .div-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .div-item {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .div-item-label { font-size: .58rem; color: var(--muted); margin-bottom: 4px; letter-spacing: .06em; }
  .div-item-value { font-size: .82rem; font-weight: 700; }
  .div-item-sub { font-size: .62rem; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  /* ── Color palette ── */
  .palette-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    align-items: center;
  }
  .palette-label { font-size: .62rem; color: var(--muted); }
  .palette-swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.15);
    box-shadow: 0 0 8px rgba(0,0,0,.4);
  }
  .palette-color-name { font-size: .65rem; color: rgba(255,255,255,.5); }

  /* ── History ── */
  .history-section { margin-top: 8px; }
  .history-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: .65rem;
    letter-spacing: .2em;
    color: var(--muted);
    text-align: center;
    margin-bottom: 14px;
  }
  .history-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .hist-item {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 2/3;
    background: var(--deep);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform .2s ease;
  }
  .hist-item:hover { transform: scale(1.03); }
  .hist-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hist-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(13,11,26,.9));
    padding: 16px 6px 6px;
  }
  .hist-date { font-size: .55rem; color: var(--gold); letter-spacing: .06em; text-align: center; }
  .hist-theme { font-size: .5rem; color: var(--muted); text-align: center; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-inner {
    max-width: 420px; width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }
  .modal-img { width: 100%; display: block; }
  .modal-info { padding: 14px 16px; }
  .modal-date { font-size: .7rem; color: var(--gold); margin-bottom: 4px; }
  .modal-theme { font-size: .75rem; color: var(--muted); margin-bottom: 10px; }
  .modal-close {
    width: 100%;
    padding: 10px;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: .8rem;
    cursor: pointer;
  }

  /* ── Style toggle ── */
  .style-row {
    display: flex; gap: 8px;
    padding: 0 20px 14px;
  }
  .style-btn {
    flex: 1; padding: 8px 4px;
    border-radius: 10px; border: 1px solid var(--border);
    background: rgba(255,255,255,.04);
    color: var(--muted); font-size: .72rem;
    cursor: pointer; transition: all .2s;
    letter-spacing: .04em;
  }
  .style-btn.active-anime {
    background: linear-gradient(135deg, rgba(167,139,250,.25), rgba(244,154,173,.2));
    border-color: rgba(167,139,250,.5); color: var(--violet); font-weight: 700;
  }
  .style-btn.active-real {
    background: linear-gradient(135deg, rgba(232,201,106,.2), rgba(110,231,183,.15));
    border-color: rgba(232,201,106,.4); color: var(--gold); font-weight: 700;
  }

  /* ── Custom prompt ── */
  .custom-section {
    padding: 0 20px 16px;
  }
  .custom-label {
    font-size: .6rem; letter-spacing: .12em; color: var(--muted);
    margin-bottom: 6px; display: block;
  }
  .custom-input {
    width: 100%; padding: 10px 12px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: .74rem; line-height: 1.5;
    resize: vertical; min-height: 60px; max-height: 120px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
  }
  .custom-input:focus { border-color: rgba(167,139,250,.5); }
  .custom-hint { font-size: .6rem; color: var(--muted); margin-top: 4px; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .image-card { animation: fadeUp .6s ease both; }
  .fortune-bar { animation: fadeUp .6s .1s ease both; }
  .div-card { animation: fadeUp .6s .2s ease both; }
  .history-section { animation: fadeUp .6s .3s ease both; }

  /* ── Lucky tag ── */
  .lucky-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 20px 14px;
  }
  .lucky-tag {
    font-size: .65rem;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
    letter-spacing: .04em;
  }

  /* No history */
  .no-history {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: .78rem;
  }
</style>
</head>

<div class="stars"></div>
<div class="wrap">

  <!-- Header -->
  <header>

  <!-- Fortune Bar -->

  <!-- Divination Details -->
  <div class="div-card" id="divCard">

  <!-- History -->

<script>
// ════════════════════════════════════════
//  DIVINATION ENGINE
// ════════════════════════════════════════

// Personal data
const BIRTH = { year:1993, month:4, day:14, hour:6, zodiac:'牡羊座', blood:'B', eto:'酉' };

// ── 旧暦変換（六曜の正確な計算のため）──
const LUNAR_DATA_LG = {
  2023:{sf:[1,22],m:[30,30,29,30,29,30,29,30,29,29,30,29,30],lp:2},
  2024:{sf:[2,10],m:[30,29,30,30,29,30,29,30,29,30,29,29],lp:null},
  2025:{sf:[1,29],m:[30,29,30,29,30,30,29,30,29,30,29,29],lp:null},
  2026:{sf:[2,17],m:[30,29,30,29,30,30,29,30,29,30,29,30],lp:null},
  2027:{sf:[2,6], m:[29,30,29,30,29,30,30,29,30,30,29,29],lp:null},
  2028:{sf:[1,26],m:[30,29,30,29,30,29,30,29,30,30,30,29,29],lp:5},
};
function solarToLunarLG(sy, sm, sd) {
  const date = new Date(sy, sm-1, sd);
  let ly = sy;
  let d = LUNAR_DATA_LG[ly];
  if(!d) { // fallback: approximate with solar month/day
    return { month: sm, day: sd };
  }
  let sf = new Date(ly, d.sf[0]-1, d.sf[1]);
  if(date < sf) {
    ly--; d = LUNAR_DATA_LG[ly];
    if(!d) return { month: sm, day: sd };
    sf = new Date(ly, d.sf[0]-1, d.sf[1]);
  }
  let rem = Math.floor((date - sf) / 86400000);
  let lm = 1;
  const leapM = d.lp;
  for(let i = 0; i < d.m.length; i++) {
    if(rem < d.m[i]) return { month: lm, day: rem + 1 };
    rem -= d.m[i];
    if(leapM && i === leapM - 1) lm--;
    lm++;
  }
  return { month: lm, day: rem + 1 };
}

// 六曜（旧暦月日から正確に計算）
// 旧暦1月1日=先勝 から6日周期: 先勝,友引,先負,仏滅,大安,赤口
const ROKUYO = ['先勝','友引','先負','仏滅','大安','赤口'];

}

// 九星気学（日家九星：エポック日数から直接算出）
// 検証: 2026/3/3(epochDay=20515) → (20515+2)%9=6 → 七赤金星 ✅
const KYUSEI_LIST = ['一白水星','二黒土星','三碧木星','四緑木星','五黄土星','六白金星','七赤金星','八白土星','九紫火星'];
function getDailyKyusei(date) {
  const epochDays = Math.floor(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) / 86400000);
  return KYUSEI_LIST[(epochDays + 2) % 9];
}

// 四柱推命 日柱（オフセット+17で正確な干支を算出）
// 検証: 2026/3/3(epochDay=20515) → kanshi=(20515+17)%60=12 → 丙子 ✅
const STEMS   = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BRANCHES= ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const ELEM_STEM  = {甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
const ELEM_ENG   = {木:'wood, nature, spring green', 火:'fire, vibrant, warm orange', 土:'earth, cozy, amber', 金:'metal, elegant, silver white', 水:'water, dreamy, blue indigo'};
const ELEM_STYLE = {木:'anime', 火:'anime', 土:'realistic', 金:'realistic', 水:'anime'};
const ELEM_COLOR = {木:'#6EE7B7', 火:'#F87171', 土:'#C9A84C', 金:'#E0E7FF', 水:'#38BDF8'};

function getDayPillar(date) {
  const epochDays = Math.floor(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) / 86400000);
  const kanshi   = ((epochDays + 17) % 60 + 60) % 60;
  const stemIdx  = kanshi % 10;
  const branchIdx= kanshi % 12;
  const stem = STEMS[stemIdx], branch = BRANCHES[branchIdx];
  return { pillar: stem+branch, stem, branch, element: ELEM_STEM[stem] };
}

}

// 運気スコア
function calcScore(rokuyo, moon, pillar, now) {
  let s = 60;
  const rb = {'大安':10,'友引':6,'先勝':5,'先負':3,'赤口':2,'仏滅':1};
  s += rb[rokuyo] || 3;
  s += Math.round(moon.age < 3 || moon.age > 27 ? 8 : moon.age < 7 ? 5 : moon.age < 15 ? 6 : 4);
  const dayBon = [4,2,5,3,6,4,8,3,5,2,6,4,5,3,4,6,5,2,6,4,5,3,4,6,5,3,4,5,2,4,4];
  s += dayBon[now.getDate() % dayBon.length];
  return Math.min(99, Math.max(55, s));
}

function computeToday() {
  const now        = new Date();
  const rokuyo     = getRokuyo(now);
  const moonData   = getMoonAge(now.getTime());
  const moon       = { ...getMoonPhase(moonData.age), age: moonData.age };
  const pillar     = getDayPillar(now);
  const tarot      = getTarot(now);
  const kyusei     = getDailyKyusei(now);
  const score      = calcScore(rokuyo, moon, pillar, now);
  const element    = pillar.element;
  const luckyColors= LUCKY_COLORS[element] || LUCKY_COLORS['金'];
  return { now, rokuyo, moon, pillar, tarot, kyusei, score, element, luckyColors };
}

//  IndexedDB（永続履歴）
// ════════════════════════════════════════
const DB_NAME    = 'LuckyGirlDB';
const DB_VERSION = 1;
const STORE_NAME = 'history';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if(db) return resolve(db);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains(STORE_NAME)) {
        const store = d.createObjectStore(STORE_NAME, { keyPath:'date' });
        store.createIndex('date', 'date', { unique: true });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => { reject(e.target.error); };
  });
}

function saveToHistory(promptData, imageData) {
  if(!currentDiv) return;
  const d = currentDiv.now;
  const dateKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  openDB().then(db => {
    const tx    = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.put({
      date:      dateKey,
      theme:     promptData.theme,
      style:     promptData.style,
      imageData: imageData, // base64 or url
      score:     currentDiv.score,
      rokuyo:    currentDiv.rokuyo,
      savedAt:   Date.now(),
    });
    tx.oncomplete = () => renderHistory();
  }).catch(e => console.warn('DB save error:', e));
}

function loadHistory() {
  return openDB().then(db => {
    return new Promise((resolve, reject) => {
      const tx    = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const req   = store.getAll();
      req.onsuccess = e => {
        // 新しい順にソート
        const all = (e.target.result || []).sort((a,b) => b.date.localeCompare(a.date));
        resolve(all);
      };
      req.onerror = e => reject(e.target.error);
    });
  });
}

function deleteHistoryEntry(date) {
  openDB().then(db => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(date);
    tx.oncomplete = () => renderHistory();
  });
}

function renderHistory() {
  loadHistory().then(history => {
    const grid = document.getElementById('historyGrid');
    if(!history || history.length === 0) {
      grid.innerHTML = '<div class="no-history" style="grid-column:1/-1">まだ履歴がありません<br><small>画像が生成されると、ここに永続保存されます</small></div>';
      return;
    }
    grid.innerHTML = history.map(h => {
      const dateLabel = h.date ? h.date.slice(5).replace('-', '/') : '—';
      const imgSrc = h.imageData || '';
      const dateEnc  = encodeURIComponent(h.date);
      const themeEnc = encodeURIComponent(h.theme || '');
      return `
      <div class="hist-item" onclick="openModal('${dateEnc}','${themeEnc}')">
        <img class="hist-img" src="${imgSrc}" loading="lazy" onerror="this.parentElement.style.background='#1a1730'">
        <div class="hist-overlay">
          <div class="hist-date">${dateLabel}</div>
          <div class="hist-theme">${h.rokuyo || ''} ${h.score ? h.score+'pt' : ''}</div>
        </div>
      </div>`;
    }).join('');
  }).catch(e => console.warn('renderHistory error:', e));
}

  };

  // Stable Horde へジョブ投稿
  fetch(`${HORDE_API}/generate/async`, {
    method: 'POST',
    headers: {
      'Content-Type':  'application/json',
      'apikey':        HORDE_KEY,
      'Client-Agent':  'lucky-girl-oracle:2.0:github',
    },
    body: JSON.stringify({
      prompt: promptData.prompt + ' ### ' + promptData.negative,
      params: {
        width:        768,   // 高解像度
        height:       1024,  // 縦長ポートレート
        steps:        30,    // 高品質ステップ数
        cfg_scale:    7.5,
        sampler_name: 'k_dpmpp_2m',  // 高品質サンプラー
        n:            1,
        post_processing: ['RealESRGAN_x4plus_anime_6B'], // 4倍アップスケール
      },
      r2:             false,   // base64で受け取る
      nsfw:           false,
      censor_nsfw:    true,
      trusted_workers:false,
      slow_workers:   true,
      models:         models,
    })
  })
  .then(r => { if(!r.ok) throw new Error('submit:'+r.status); return r.json(); })
  .then(data => {
    if(!data.id) throw new Error('no job id');
    hordeJobId = data.id;
    hint.textContent = `✦ AIキューに入りました… 少々お待ちください`;

    pollInterval = setInterval(() => {
      waitSecs += 5;
      fetch(`${HORDE_API}/generate/check/${hordeJobId}`, {
        headers: { 'Client-Agent': 'lucky-girl-oracle:2.0:github' }
      })
      .then(r => r.json())
      .then(status => {
        const pos  = status.queue_position || 0;
        const wait = status.wait_time || 0;
        const done = status.done;

        if(done) {
          stopPoll();
          hint.textContent = '✦ 完成！画像を受信中…';
          fetch(`${HORDE_API}/generate/status/${hordeJobId}`, {
            headers: { 'Client-Agent': 'lucky-girl-oracle:2.0:github' }
          })
          .then(r => r.json())
          .then(result => {
            const gen = result.generations && result.generations[0];
            if(!gen || !gen.img) { onFail(); return; }
            if(!isGenerating) return;

            // URLかbase64かを判定し、常にbase64でIndexedDBに保存
            const ensureBase64 = (imgData) => {
              if(!imgData.startsWith('http')) {
                // 既にbase64
                return Promise.resolve(`data:image/webp;base64,${imgData}`);
              }
              // URLの場合はfetchしてbase64に変換（永続化のため）
              return fetch(imgData)
                .then(r => r.blob())
                .then(blob => new Promise((resolve, reject) => {
                  const reader = new FileReader();
                  reader.onload  = e => resolve(e.target.result);
                  reader.onerror = () => reject(new Error('FileReader error'));
                  reader.readAsDataURL(blob);
                }))
                .catch(() => imgData); // 変換失敗時はURLのまま
            };

            ensureBase64(gen.img).then(src => {
              currentImageUrl = src;
              isGenerating = false;
              img.onload = () => {
                img.classList.add('loaded');
                loading.classList.add('hidden');
                dlBtn.disabled    = false;
                regenBtn.disabled = false;
                saveToHistory(promptData, src); // base64でIndexedDBに永続保存
              };
              img.src = src;
            });
          })
          .catch(() => onFail());

        } else if(status.faulted) {
          stopPoll(); onFail();
        } else {
          if(pos > 0) hint.textContent = `✦ キュー ${pos}番目 / 残り約${wait}秒`;
          else        hint.textContent = `✦ 高画質生成中… ${waitSecs}秒経過`;
          if(waitSecs > 360) { stopPoll(); onFail(); }
        }
      })
      .catch(e => console.warn('poll error:', e));
    }, 5000);
  })
  .catch(e => { console.warn('horde error:', e); onFail(); });
}

function getDailySeed(div) {
  const d = div.now;
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

function regenerate() {
  if(isGenerating) return;
  if(!currentDiv) return;
  stopPoll(); isGenerating = false;
  const promptData = buildPrompt(currentDiv);
  currentPromptData = promptData;
  const seed = getDailySeed(currentDiv) + Math.floor(Math.random() * 9999);
  generateImage(promptData, seed);
}

// ════════════════════════════════════════
//  DOWNLOAD
// ════════════════════════════════════════
function downloadImage() {
  if(!currentImageUrl) return;
  const d   = currentDiv ? currentDiv.now : new Date();
  const fname = `lucky-girl-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.webp`;
  if(currentImageUrl.startsWith('data:')) {
    const a = document.createElement('a');
    a.download = fname; a.href = currentImageUrl; a.click();
  } else {
    const a = document.createElement('a');
    a.href = currentImageUrl; a.target = '_blank'; a.rel = 'noopener';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
}

// ════════════════════════════════════════
//  MODAL（IndexedDB対応）
// ════════════════════════════════════════
function openModal(dateEnc, themeEnc) {
  const date  = decodeURIComponent(dateEnc);
  const theme = decodeURIComponent(themeEnc);
  openDB().then(db => {
    const tx  = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(date);
    req.onsuccess = e => {
      const entry = e.target.result;
      if(!entry) return;
      document.getElementById('modalImg').src   = entry.imageData || '';
      document.getElementById('modalDate').textContent  = `${date} ${entry.rokuyo || ''}`;
      document.getElementById('modalTheme').textContent = theme;
      document.getElementById('histModal').classList.add('open');
    };
  });
}
function closeModal(e) {
  if(!e || e.target === document.getElementById('histModal'))
    document.getElementById('histModal').classList.remove('open');
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
function init() {
  initStyleUI();

  try {
    const div    = computeToday();
    currentDiv   = div;
    updateUI(div);
  } catch(e) {
    console.error('updateUI error:', e);
  }

  renderHistory();

  // 今日の履歴をDBから探して表示
  const d = currentDiv ? currentDiv.now : new Date();
  const todayKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  openDB().then(db => {
    const tx  = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(todayKey);
    req.onsuccess = e => {
      const entry = e.target.result;
      const promptData = buildPrompt(currentDiv);
      currentPromptData = promptData;
      document.getElementById('promptText').textContent = promptData.prompt;

      if(entry && entry.imageData) {
        // 今日のキャッシュあり → 即表示
        const img     = document.getElementById('mainImg');
        const loading = document.getElementById('loadingOverlay');
        currentImageUrl = entry.imageData;
        img.onload = () => {
          img.classList.add('loaded');
          loading.classList.add('hidden');
          document.getElementById('dlBtn').disabled = false;
        };
        img.src = entry.imageData;
      } else {
        generateImage(promptData, getDailySeed(currentDiv));
      }
    };
    req.onerror = () => {
      const promptData = buildPrompt(currentDiv);
      generateImage(promptData, getDailySeed(currentDiv));
    };
  }).catch(() => {
    const promptData = buildPrompt(currentDiv);
    generateImage(promptData, getDailySeed(currentDiv));
  });
}

window.onerror = (msg) => { if(typeof msg==='string' && msg.includes('Script error')) return true; };
window.onunhandledrejection = (e) => console.warn('Unhandled:', e.reason);
document.addEventListener('DOMContentLoaded', init);
</script>
